<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SVG 图标查看器</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="stylesheet" href="./icons/bootstrap-icons.min.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<section class="m" id="m">
  <div class="m-box">
	<div class="m-hd" id="m-name"></div>
	<div class="m-sec">
	  <div class="m-lab">SVG 预览</div>
	  <div class="m-pre" id="m-pre"></div>
	</div>
	<div class="m-sec">
	  <div class="m-lab">SVG 代码</div>
	  <textarea readonly id="m-code"></textarea>
	</div>
	<div class="m-ft">
	  <button class="btn" onclick="cModal()">关闭</button>
	</div>
  </div>
</section>
<div class="top-btn" id="topBtn"><i class="bi bi-arrow-up"></i></div>
<header>
  <div class="h-top">
	<h1>离线 SVG 图标查看器</h1>
	<div class="t-bar">
	  <button class="t-btn active" onclick="sSize(32,this)"><i class="bi bi-square-fill" style="font-size:1.0rem;"></i>小</button>
	  <button class="t-btn" onclick="sSize(48,this)"><i class="bi bi-square-fill" style="font-size:1.1rem;"></i>中</button>
	  <button class="t-btn" onclick="sSize(64,this)"><i class="bi bi-square-fill" style="font-size:1.2rem;"></i>大</button>
	  <button class="t-btn" onclick="tDark()" id="tBtn"><i class="bi bi-sun-fill"></i>亮色</button>
	</div>
  </div>
  <input class="search" id="search" placeholder="搜索图标名称...">
  <div class="cnt" id="count"></div>
</header>
<main id="grid"></main>
<script src="./script.js"></script>
</body>
</html>
